name: Build Flash Boot Tool

on:
  push:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend exe
        run: |
          pyinstaller main.py --onefile --name FlashBootBackend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-exe
          path: dist/FlashBootBackend.exe


  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: |
          cd electron-app
          npm install

      - name: Build Electron app
        run: |
          cd electron-app
          npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: electron-app/dist/**
