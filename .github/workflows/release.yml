name: Auto Build & Release Flash Boot Tool

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # 🐍 BACKEND BUILD
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend exe
        run: |
          pyinstaller backend/main.py --onefile --name FlashBootBackend

      # =========================
      # 🌐 FRONTEND BUILD (Electron)
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Build Electron app
        run: |
          cd frontend
          npm run build

      # =========================
      # 📦 COLLECT FILES
      # =========================
      - name: Upload backend exe
        uses: actions/upload-artifact@v4
        with:
          name: backend-exe
          path: dist/FlashBootBackend.exe

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: frontend/dist/**

      # =========================
      # 💿 CREATE RELEASE
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FlashBootBackend.exe
            frontend/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
